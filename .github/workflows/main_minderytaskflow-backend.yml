name: Deploy Backend to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./server   # ✅ IMPORTANT
        run: npm install

      - name: Upload backend files
        uses: actions/upload-artifact@v4
        with:
          name: backend
          path: ./server   # ✅ IMPORTANT

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download backend files
        uses: actions/download-artifact@v4
        with:
          name: backend

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: minderytaskflow-backend
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_382621898A8044C48D6297FCDF0A28EF }}
          package: .   # ✅ NOW this is correct (because artifact = server folder)